<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Carthage Café</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>Menu — Carthage Café</h1>
</header>

<nav>
  <a href="index.html">Accueil</a>
  <a href="menu.html">Menu</a>
  <a href="commande.html">Commander</a>
  <a href="contact.html">Adresse</a>
</nav>

<main class="main">

  <!-- CAFÉ -->
  <section class="section">
    <div class="category-title">
      <img src="images/cafe.jpg" class="category-icon">
      <h2>Café</h2>
    </div>
    <div id="cafe" class="menu-grid"></div>
  </section>

  <!-- BOISSONS -->
  <section class="section">
    <div class="category-title">
      <img src="images/boisson.jpg" class="category-icon">
      <h2>Boissons</h2>
    </div>
    <div id="boisson" class="menu-grid"></div>
  </section>

  <!-- CHICHA -->
  <section class="section">
    <div class="category-title">
      <img src="images/chicha.jpg" class="category-icon">
      <h2>Chicha</h2>
    </div>
    <div id="chicha" class="menu-grid"></div>
  </section>

  <!-- AUTRES -->
  <section class="section">
    <div class="category-title">
      <img src="images/autre.jpg" class="category-icon">
      <h2>Autres</h2>
    </div>
    <div id="autre" class="menu-grid"></div>
  </section>

  <!-- PANIER -->
  <section class="section">
    <h2>Votre panier</h2>

    <div class="cart-items"></div>

    <div class="cart-total">
      Total : <span class="cart-total-value">0.000 DT</span>
    </div>

    <div class="btn-row">
      <a href="commande.html" class="btn btn-primary">Valider la commande</a>
    </div>
  </section>

</main>

<footer>
  CARTHAGE Café — El May, Djerba
</footer>

<!-- Firebase -->
<script type="module" src="firebase-config.js"></script>

<!-- Script du menu -->
<script type="module" src="menu.js"></script>

</body>
</html>
