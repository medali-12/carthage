<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Menu — Carthage Café</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>ADMIN — MENU</h1>
  <p>Gestion des produits</p>
</header>

<nav>
  <a href="index.html">Accueil</a>
  <a href="menu.html">Menu</a>
  <a href="commande.html">Commander</a>
  <a href="contact.html">Adresse</a>
  <a href="admin.html">Admin</a>
  <a href="#" onclick="logout()">Déconnexion</a>
</nav>

<main class="main">

  <section class="section">
    <h2>Ajouter un produit</h2>

    <input type="text" id="nom" placeholder="Nom du produit">
    <input type="number" id="prix" placeholder="Prix">
    <input type="text" id="categorie" placeholder="Catégorie (cafe, boisson, chicha, autre)">

    <!-- Ajout propre de l'image -->
    <input type="file" id="image" accept="image/*">

    <button id="ajouter" class="btn btn-primary">Ajouter</button>
  </section>

  <section class="section">
    <h2>Produits existants</h2>
    <div id="produits"></div>
  </section>

</main>

<footer>
  CARTHAGE Café — El May, Djerba
</footer>

<script type="module" src="admin-menu.js"></script>

</body>
</html>
