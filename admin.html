<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CARTHAGE Café — Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

<header>
  <h1>CARTHAGE CAFÉ — Admin</h1>
  <p>Gestion des produits</p>
</header>

<nav>
  <a href="index.html">Accueil</a>
  <a href="menu.html">Menu</a>
  <a href="commande.html">Commander</a>
  <a href="contact.html">Adresse</a>
  <a href="admin.html">Admin</a>
</nav>

<main class="main">
  <section class="section">

    <h2>Ajouter / modifier un produit</h2>

    <form id="product-form" class="form-grid">
      <input type="hidden" id="product-id">

      <div>
        <label for="product-name">Nom du produit</label>
        <input type="text" id="product-name" required>
      </div>

      <div>
        <label for="product-price">Prix (DT)</label>
        <input type="number" step="0.001" id="product-price" required>
      </div>

      <div>
        <label for="product-category">Catégorie</label>
        <input type="text" id="product-category" placeholder="cafe, chicha, other..." required>
      </div>

      <div>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <button type="button" id="cancel-edit" class="btn btn-outline">Annuler</button>
      </div>
    </form>

  </section>

  <section class="section">
    <h2>Liste des produits</h2>

    <table class="table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Prix</th>
          <th>Catégorie</th>
          <th>Disponible</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="products-body">
        <!-- rempli par admin.js -->
      </tbody>
    </table>
  </section>
</main>

<footer>
  CARTHAGE Café — El May, Djerba
</footer>

<script type="module" src="admin.js"></script>
</body>
</html>
